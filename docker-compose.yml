services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vidyaai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vidyaai
      POSTGRES_USER: vidyaai_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidyaai_admin -d vidyaai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (rate limiting) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vidyaai-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (local S3 replacement) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vidyaai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO bucket init (runs once, then exits) ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: vidyaai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/vidyaai-audio;
        mc anonymous set public local/vidyaai-audio;
        echo 'MinIO bucket vidyaai-audio ready.';
      "
    restart: "no"

  # ── VidyaAI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vidyaai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env.docker
    environment:
      # Constructed here so ${POSTGRES_PASSWORD} is interpolated from .env.docker
      DATABASE_URL: postgresql://vidyaai_admin:${POSTGRES_PASSWORD}@postgres:5432/vidyaai
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:
